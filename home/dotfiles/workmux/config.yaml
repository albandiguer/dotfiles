nerdfont: true # Enable nerdfont icons (prompted on first run)
merge_strategy: rebase # Make workmux merge do rebase by default
agent: $DEFAULT_AI_AGENT
mode: session

files:
  copy:
  symlinks:
    - .claude/
    - .config/
    - .envrc
    - .mise.local.toml
    - .nvim.lua
    - .serena/

windows:
  - name: editor
    panes:
      - command: nvim
  - name: agent
    panes:
      - command: <agent>
        focus: true
  - name: shell
    panes:
      - {}
