prSections:
  - title: My Pull Requests
    filters: is:open author:@me -is:draft
  - title: My Drafts
    filters: is:open author:@me is:draft
  - title: Needs My Review (Named)
    filters: is:open user-review-requested:@me -is:draft
  - title: Needs My Review
    filters: is:open review-requested:@me -is:draft
  - title: Involved
    filters: is:open involves:@me -author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
notificationsSections:
  - title: All
    filters: ""
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
defaults:
  # open: false works around a gh-dash 4.24.1 crash in tmux popups: the popup
  # never delivers the OSC-11 background-color reply, so markdownStyle stays nil
  # and rendering a PR preview panics (fixed on gh-dash main, not yet released).
  # syncSidebar early-returns when the sidebar is closed, avoiding the panic.
  preview:
    open: false
    width: 160
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  notificationsLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  prs:
    - key: H
      name: enHance PR
      command: gh enhance -R {{.RepoName}} {{.PrNumber}}
    - key: L
      name: open Lazygit
      command: lazygit
    - key: E
      name: Edit PR in neovim/octo
      command: 'tmux new-window -c {{.RepoPath}} "nvim -c \":silent Octo pr edit
        {{.PrNumber}}\""'
    - key: F
      name: Full review in worktree
      command: 'sh -c "cd {{.RepoPath}} && gh pr view {{.PrNumber}} --json headRefName --jq .headRefName | xargs wt switch --create"'
repoPaths:
  albandiguer/*: ~/dev/*
  finspot/pretto: ~/dev/finspot/pretto
theme:
  colors:
    text:
      primary: "#c6d0f5"
      secondary: "#ca9ee6"
      inverted: "#232634"
      faint: "#b5bfe2"
      warning: "#e5c890"
      success: "#a6d189"
      error: "#e78284"
    background:
      selected: "#414559"
    border:
      primary: "#ca9ee6"
      secondary: "#51576d"
      faint: "#414559"
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
pager:
  diff: diffnav
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
